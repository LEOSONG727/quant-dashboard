<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Animal Tetris</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #fff;
            overflow: hidden;
        }

        .game-wrapper {
            display: flex;
            gap: 24px;
            align-items: flex-start;
        }

        .side-panel {
            display: flex;
            flex-direction: column;
            gap: 16px;
            min-width: 160px;
        }

        .panel-box {
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 12px;
            padding: 16px;
            backdrop-filter: blur(10px);
        }

        .panel-box h3 {
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: rgba(255, 255, 255, 0.6);
            margin-bottom: 8px;
            text-align: center;
        }

        .panel-box .value {
            font-size: 28px;
            font-weight: 700;
            text-align: center;
            color: #f8f8f8;
        }

        #next-piece-display {
            display: grid;
            grid-template-columns: repeat(4, 36px);
            grid-template-rows: repeat(4, 36px);
            justify-content: center;
            gap: 1px;
        }

        #next-piece-display .cell {
            width: 36px;
            height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
        }

        .game-board-container {
            position: relative;
        }

        .game-board-container h1 {
            text-align: center;
            font-size: 26px;
            margin-bottom: 12px;
            letter-spacing: 3px;
            background: linear-gradient(90deg, #ff6b6b, #ffd93d, #6bcb77, #4d96ff, #ff6b6b);
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: shineTitle 3s linear infinite;
        }

        @keyframes shineTitle {
            to { background-position: 200% center; }
        }

        #game-board {
            display: grid;
            grid-template-columns: repeat(10, 38px);
            grid-template-rows: repeat(20, 38px);
            gap: 1px;
            background: rgba(0, 0, 0, 0.5);
            border: 2px solid rgba(255, 255, 255, 0.2);
            border-radius: 8px;
            padding: 2px;
        }

        #game-board .cell {
            width: 38px;
            height: 38px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            transition: background 0.1s;
        }

        #game-board .cell.filled {
            background: rgba(255, 255, 255, 0.1);
            animation: placeBlock 0.15s ease-out;
        }

        #game-board .cell.clearing {
            animation: clearRow 0.4s ease-out forwards;
        }

        @keyframes placeBlock {
            from { transform: scale(1.15); }
            to { transform: scale(1); }
        }

        @keyframes clearRow {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.3); opacity: 0.8; }
            100% { transform: scale(0); opacity: 0; }
        }

        .controls-info {
            margin-top: 12px;
            font-size: 11px;
            color: rgba(255, 255, 255, 0.4);
            text-align: center;
            line-height: 1.8;
        }

        .controls-info kbd {
            background: rgba(255, 255, 255, 0.1);
            padding: 2px 8px;
            border-radius: 4px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            font-family: inherit;
        }

        /* Game Over Overlay */
        .game-over-overlay {
            position: absolute;
            inset: 0;
            background: rgba(0, 0, 0, 0.85);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border-radius: 8px;
            z-index: 10;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.4s;
        }

        .game-over-overlay.visible {
            opacity: 1;
            pointer-events: all;
        }

        .game-over-overlay h2 {
            font-size: 36px;
            margin-bottom: 8px;
            color: #ff6b6b;
        }

        .game-over-overlay .final-score {
            font-size: 20px;
            margin-bottom: 24px;
            color: rgba(255, 255, 255, 0.7);
        }

        .game-over-overlay button,
        .start-btn {
            background: linear-gradient(135deg, #6bcb77, #4d96ff);
            border: none;
            color: white;
            padding: 12px 32px;
            font-size: 16px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            letter-spacing: 1px;
            transition: transform 0.15s, box-shadow 0.15s;
        }

        .game-over-overlay button:hover,
        .start-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(75, 150, 255, 0.4);
        }

        .pause-indicator {
            position: absolute;
            inset: 0;
            background: rgba(0, 0, 0, 0.7);
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 8px;
            z-index: 9;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s;
        }

        .pause-indicator.visible {
            opacity: 1;
            pointer-events: all;
        }

        .pause-indicator span {
            font-size: 32px;
            letter-spacing: 4px;
            text-transform: uppercase;
        }

        /* Mobile touch controls */
        .touch-controls {
            display: none;
            margin-top: 16px;
            gap: 8px;
            justify-content: center;
        }

        .touch-btn {
            width: 56px;
            height: 56px;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            background: rgba(255, 255, 255, 0.1);
            color: white;
            font-size: 22px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            user-select: none;
            -webkit-user-select: none;
            touch-action: manipulation;
        }

        .touch-btn:active {
            background: rgba(255, 255, 255, 0.25);
        }

        @media (max-width: 768px) {
            .game-wrapper {
                flex-direction: column;
                align-items: center;
                gap: 12px;
            }
            .side-panel {
                flex-direction: row;
                min-width: auto;
            }
            .touch-controls {
                display: flex;
            }
            #game-board {
                grid-template-columns: repeat(10, 32px);
                grid-template-rows: repeat(20, 32px);
            }
            #game-board .cell {
                width: 32px;
                height: 32px;
                font-size: 20px;
            }
        }
    </style>
</head>
<body>
    <div class="game-wrapper">
        <div class="side-panel">
            <div class="panel-box">
                <h3>Score</h3>
                <div class="value" id="score">0</div>
            </div>
            <div class="panel-box">
                <h3>Level</h3>
                <div class="value" id="level">1</div>
            </div>
            <div class="panel-box">
                <h3>Lines</h3>
                <div class="value" id="lines">0</div>
            </div>
            <div class="panel-box">
                <h3>Next</h3>
                <div id="next-piece-display"></div>
            </div>
        </div>

        <div class="game-board-container">
            <h1>ANIMAL TETRIS</h1>
            <div id="game-board"></div>
            <div class="pause-indicator" id="pause-overlay">
                <span>PAUSED</span>
            </div>
            <div class="game-over-overlay" id="game-over-overlay">
                <h2>GAME OVER</h2>
                <div class="final-score" id="final-score"></div>
                <button onclick="game.restart()">PLAY AGAIN</button>
            </div>
            <div class="controls-info">
                <kbd>&larr;</kbd> <kbd>&rarr;</kbd> Move &nbsp;
                <kbd>&uarr;</kbd> Rotate &nbsp;
                <kbd>&darr;</kbd> Soft Drop &nbsp;
                <kbd>Space</kbd> Hard Drop &nbsp;
                <kbd>P</kbd> Pause
            </div>
            <div class="touch-controls">
                <div class="touch-btn" ontouchstart="game.moveLeft()" onclick="game.moveLeft()">&#9664;</div>
                <div class="touch-btn" ontouchstart="game.rotate()" onclick="game.rotate()">&#8635;</div>
                <div class="touch-btn" ontouchstart="game.hardDrop()" onclick="game.hardDrop()">&#9660;</div>
                <div class="touch-btn" ontouchstart="game.moveRight()" onclick="game.moveRight()">&#9654;</div>
            </div>
        </div>
    </div>

    <script>
    const ANIMAL_EMOJIS = ['🐶', '🐱', '🐻', '🐼', '🐸', '🦊', '🐯'];

    // Tetromino definitions: each piece maps to an animal emoji
    const TETROMINOES = [
        { // I-piece
            shape: [[1,1,1,1]],
            emoji: '🐶'
        },
        { // O-piece
            shape: [[1,1],[1,1]],
            emoji: '🐱'
        },
        { // T-piece
            shape: [[0,1,0],[1,1,1]],
            emoji: '🐻'
        },
        { // S-piece
            shape: [[0,1,1],[1,1,0]],
            emoji: '🐼'
        },
        { // Z-piece
            shape: [[1,1,0],[0,1,1]],
            emoji: '🐸'
        },
        { // L-piece
            shape: [[1,0],[1,0],[1,1]],
            emoji: '🦊'
        },
        { // J-piece
            shape: [[0,1],[0,1],[1,1]],
            emoji: '🐯'
        }
    ];

    const COLS = 10;
    const ROWS = 20;
    const POINTS = [0, 100, 300, 500, 800]; // 0,1,2,3,4 lines cleared
    const LINES_PER_LEVEL = 10;

    class AnimalTetris {
        constructor() {
            this.board = [];
            this.score = 0;
            this.lines = 0;
            this.level = 1;
            this.currentPiece = null;
            this.nextPiece = null;
            this.gameOver = false;
            this.paused = false;
            this.dropInterval = null;
            this.init();
        }

        init() {
            this.createBoard();
            this.createBoardDOM();
            this.createNextPieceDOM();
            this.bindControls();
            this.reset();
        }

        createBoard() {
            this.board = Array.from({ length: ROWS }, () =>
                Array.from({ length: COLS }, () => null)
            );
        }

        createBoardDOM() {
            const boardEl = document.getElementById('game-board');
            boardEl.innerHTML = '';
            for (let r = 0; r < ROWS; r++) {
                for (let c = 0; c < COLS; c++) {
                    const cell = document.createElement('div');
                    cell.classList.add('cell');
                    cell.dataset.row = r;
                    cell.dataset.col = c;
                    boardEl.appendChild(cell);
                }
            }
        }

        createNextPieceDOM() {
            const display = document.getElementById('next-piece-display');
            display.innerHTML = '';
            for (let r = 0; r < 4; r++) {
                for (let c = 0; c < 4; c++) {
                    const cell = document.createElement('div');
                    cell.classList.add('cell');
                    cell.dataset.nr = r;
                    cell.dataset.nc = c;
                    display.appendChild(cell);
                }
            }
        }

        reset() {
            this.board = Array.from({ length: ROWS }, () =>
                Array.from({ length: COLS }, () => null)
            );
            this.score = 0;
            this.lines = 0;
            this.level = 1;
            this.gameOver = false;
            this.paused = false;
            this.currentPiece = null;
            this.nextPiece = this.randomPiece();
            this.spawnPiece();
            this.updateUI();
            this.render();
            document.getElementById('game-over-overlay').classList.remove('visible');
            document.getElementById('pause-overlay').classList.remove('visible');
            this.startDropTimer();
        }

        restart() {
            this.reset();
        }

        randomPiece() {
            const idx = Math.floor(Math.random() * TETROMINOES.length);
            const t = TETROMINOES[idx];
            return {
                shape: t.shape.map(row => [...row]),
                emoji: t.emoji
            };
        }

        spawnPiece() {
            this.currentPiece = {
                ...this.nextPiece,
                shape: this.nextPiece.shape.map(row => [...row]),
                row: 0,
                col: Math.floor((COLS - this.nextPiece.shape[0].length) / 2)
            };
            this.nextPiece = this.randomPiece();
            this.renderNextPiece();

            if (!this.isValidPosition(this.currentPiece.shape, this.currentPiece.row, this.currentPiece.col)) {
                this.endGame();
            }
        }

        isValidPosition(shape, row, col) {
            for (let r = 0; r < shape.length; r++) {
                for (let c = 0; c < shape[r].length; c++) {
                    if (shape[r][c]) {
                        const newR = row + r;
                        const newC = col + c;
                        if (newR < 0 || newR >= ROWS || newC < 0 || newC >= COLS) return false;
                        if (this.board[newR][newC]) return false;
                    }
                }
            }
            return true;
        }

        rotatePiece(shape) {
            const rows = shape.length;
            const cols = shape[0].length;
            const rotated = Array.from({ length: cols }, (_, c) =>
                Array.from({ length: rows }, (_, r) => shape[rows - 1 - r][c])
            );
            return rotated;
        }

        lockPiece() {
            const { shape, row, col, emoji } = this.currentPiece;
            for (let r = 0; r < shape.length; r++) {
                for (let c = 0; c < shape[r].length; c++) {
                    if (shape[r][c]) {
                        const boardR = row + r;
                        const boardC = col + c;
                        if (boardR >= 0 && boardR < ROWS && boardC >= 0 && boardC < COLS) {
                            this.board[boardR][boardC] = emoji;
                        }
                    }
                }
            }
            this.clearLines();
            this.spawnPiece();
        }

        clearLines() {
            const fullRows = [];
            for (let r = 0; r < ROWS; r++) {
                if (this.board[r].every(cell => cell !== null)) {
                    fullRows.push(r);
                }
            }

            if (fullRows.length === 0) {
                this.render();
                return;
            }

            // Show clearing animation
            fullRows.forEach(r => {
                for (let c = 0; c < COLS; c++) {
                    const cell = this.getCellEl(r, c);
                    if (cell) cell.classList.add('clearing');
                }
            });

            setTimeout(() => {
                // Remove full rows from top to bottom
                for (let i = fullRows.length - 1; i >= 0; i--) {
                    this.board.splice(fullRows[i], 1);
                    this.board.unshift(Array.from({ length: COLS }, () => null));
                }

                const cleared = fullRows.length;
                this.lines += cleared;
                this.score += POINTS[cleared] * this.level;
                this.level = Math.floor(this.lines / LINES_PER_LEVEL) + 1;

                this.updateUI();
                this.render();
                this.startDropTimer(); // adjust speed for new level
            }, 400);
        }

        getCellEl(r, c) {
            return document.querySelector(`#game-board .cell[data-row="${r}"][data-col="${c}"]`);
        }

        moveLeft() {
            if (this.gameOver || this.paused || !this.currentPiece) return;
            const { shape, row, col } = this.currentPiece;
            if (this.isValidPosition(shape, row, col - 1)) {
                this.currentPiece.col--;
                this.render();
            }
        }

        moveRight() {
            if (this.gameOver || this.paused || !this.currentPiece) return;
            const { shape, row, col } = this.currentPiece;
            if (this.isValidPosition(shape, row, col + 1)) {
                this.currentPiece.col++;
                this.render();
            }
        }

        moveDown() {
            if (this.gameOver || this.paused || !this.currentPiece) return;
            const { shape, row, col } = this.currentPiece;
            if (this.isValidPosition(shape, row + 1, col)) {
                this.currentPiece.row++;
                this.render();
                return true;
            } else {
                this.lockPiece();
                return false;
            }
        }

        rotate() {
            if (this.gameOver || this.paused || !this.currentPiece) return;
            const rotated = this.rotatePiece(this.currentPiece.shape);
            const { row, col } = this.currentPiece;

            // Try normal rotation
            if (this.isValidPosition(rotated, row, col)) {
                this.currentPiece.shape = rotated;
                this.render();
                return;
            }
            // Wall kick: try shifting left/right
            for (const offset of [-1, 1, -2, 2]) {
                if (this.isValidPosition(rotated, row, col + offset)) {
                    this.currentPiece.shape = rotated;
                    this.currentPiece.col += offset;
                    this.render();
                    return;
                }
            }
        }

        hardDrop() {
            if (this.gameOver || this.paused || !this.currentPiece) return;
            let dropCount = 0;
            while (this.isValidPosition(this.currentPiece.shape, this.currentPiece.row + 1, this.currentPiece.col)) {
                this.currentPiece.row++;
                dropCount++;
            }
            this.score += dropCount * 2;
            this.updateUI();
            this.lockPiece();
        }

        getGhostRow() {
            if (!this.currentPiece) return 0;
            let ghostRow = this.currentPiece.row;
            while (this.isValidPosition(this.currentPiece.shape, ghostRow + 1, this.currentPiece.col)) {
                ghostRow++;
            }
            return ghostRow;
        }

        togglePause() {
            if (this.gameOver) return;
            this.paused = !this.paused;
            document.getElementById('pause-overlay').classList.toggle('visible', this.paused);
            if (!this.paused) {
                this.startDropTimer();
            } else {
                clearInterval(this.dropInterval);
            }
        }

        startDropTimer() {
            clearInterval(this.dropInterval);
            if (this.gameOver || this.paused) return;
            const speed = Math.max(100, 800 - (this.level - 1) * 70);
            this.dropInterval = setInterval(() => {
                if (!this.paused && !this.gameOver) {
                    this.moveDown();
                }
            }, speed);
        }

        endGame() {
            this.gameOver = true;
            clearInterval(this.dropInterval);
            document.getElementById('final-score').textContent = `Score: ${this.score} | Lines: ${this.lines}`;
            document.getElementById('game-over-overlay').classList.add('visible');
        }

        updateUI() {
            document.getElementById('score').textContent = this.score;
            document.getElementById('level').textContent = this.level;
            document.getElementById('lines').textContent = this.lines;
        }

        render() {
            // Clear all cells
            const cells = document.querySelectorAll('#game-board .cell');
            cells.forEach(cell => {
                cell.textContent = '';
                cell.classList.remove('filled', 'clearing');
            });

            // Draw locked board
            for (let r = 0; r < ROWS; r++) {
                for (let c = 0; c < COLS; c++) {
                    if (this.board[r][c]) {
                        const cell = this.getCellEl(r, c);
                        if (cell) {
                            cell.textContent = this.board[r][c];
                            cell.classList.add('filled');
                        }
                    }
                }
            }

            if (!this.currentPiece) return;

            // Draw ghost piece
            const ghostRow = this.getGhostRow();
            const { shape, col, emoji } = this.currentPiece;
            if (ghostRow !== this.currentPiece.row) {
                for (let r = 0; r < shape.length; r++) {
                    for (let c = 0; c < shape[r].length; c++) {
                        if (shape[r][c]) {
                            const cell = this.getCellEl(ghostRow + r, col + c);
                            if (cell && !cell.textContent) {
                                cell.textContent = emoji;
                                cell.style.opacity = '0.25';
                            }
                        }
                    }
                }
            }

            // Draw current piece
            for (let r = 0; r < shape.length; r++) {
                for (let c = 0; c < shape[r].length; c++) {
                    if (shape[r][c]) {
                        const boardR = this.currentPiece.row + r;
                        const boardC = col + c;
                        if (boardR >= 0) {
                            const cell = this.getCellEl(boardR, boardC);
                            if (cell) {
                                cell.textContent = emoji;
                                cell.style.opacity = '1';
                            }
                        }
                    }
                }
            }
        }

        renderNextPiece() {
            const display = document.getElementById('next-piece-display');
            const cells = display.querySelectorAll('.cell');
            cells.forEach(c => c.textContent = '');

            if (!this.nextPiece) return;
            const { shape, emoji } = this.nextPiece;
            // Center the piece in the 4x4 grid
            const offsetR = Math.floor((4 - shape.length) / 2);
            const offsetC = Math.floor((4 - shape[0].length) / 2);

            for (let r = 0; r < shape.length; r++) {
                for (let c = 0; c < shape[r].length; c++) {
                    if (shape[r][c]) {
                        const cell = display.querySelector(`.cell[data-nr="${offsetR + r}"][data-nc="${offsetC + c}"]`);
                        if (cell) cell.textContent = emoji;
                    }
                }
            }
        }

        bindControls() {
            document.addEventListener('keydown', (e) => {
                if (this.gameOver && e.key !== 'Enter') return;

                switch (e.key) {
                    case 'ArrowLeft':
                        e.preventDefault();
                        this.moveLeft();
                        break;
                    case 'ArrowRight':
                        e.preventDefault();
                        this.moveRight();
                        break;
                    case 'ArrowDown':
                        e.preventDefault();
                        if (!this.paused) {
                            this.moveDown();
                            this.score += 1;
                            this.updateUI();
                        }
                        break;
                    case 'ArrowUp':
                        e.preventDefault();
                        this.rotate();
                        break;
                    case ' ':
                        e.preventDefault();
                        this.hardDrop();
                        break;
                    case 'p':
                    case 'P':
                        this.togglePause();
                        break;
                    case 'Enter':
                        if (this.gameOver) this.restart();
                        break;
                }
            });
        }
    }

    const game = new AnimalTetris();
    </script>
</body>
</html>
